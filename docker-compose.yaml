version: '3.8'

services:
  tasks_db:
    image: postgres:15-alpine
    container_name: tasks_postgres_db
    environment:
      POSTGRES_USER: auth_admin
      POSTGRES_PASSWORD: "1234"
      POSTGRES_DB: tasks_db
    ports:
      - "5433:5432"
    volumes:
      - tasks_db_data:/var/lib/postgresql/data

volumes:
  tasks_db_data: